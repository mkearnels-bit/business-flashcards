    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3a5f;
            --primary-dark: #152d4a;
            --primary-light: #2a4a73;
            --accent: #e67e22;
            --dark: #0f172a;
            --gray-900: #1e293b;
            --gray-700: #334155;
            --gray-500: #64748b;
            --gray-300: #cbd5e1;
            --gray-100: #f1f5f9;
            --white: #ffffff;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 50%, #f0f9ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .logo img {
            height: 110px;
            width: auto;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--gray-500);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--gray-100);
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
            background: var(--gray-100);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .form-input::placeholder {
            color: var(--gray-500);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-500);
            cursor: pointer;
            font-size: 1.25rem;
        }

        .password-requirements {
            font-size: 0.75rem;
            color: var(--gray-500);
            margin-top: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #d35400 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(230, 126, 34, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 126, 34, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            margin-top: 1rem;
            margin-bottom: 0.25rem;
        }

        .terms-checkbox input[type="checkbox"] {
            margin-top: 0.2rem;
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms-checkbox label {
            font-size: 0.8rem;
            color: var(--gray-500);
            cursor: pointer;
            line-height: 1.5;
        }

        .terms-checkbox a {
            color: var(--primary);
            text-decoration: none;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        .terms-error {
            font-size: 0.75rem;
            color: var(--error);
            margin-top: 0.25rem;
            display: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-100);
            color: var(--gray-500);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: none;
        }

        .message.error {
            background: #fef2f2;
            color: var(--error);
            border: 1px solid #fecaca;
        }

        .message.success {
            background: #f0fdf4;
            color: var(--success);
            border: 1px solid #bbf7d0;
        }

        .message.show {
            display: block;
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: var(--gray-500);
            text-decoration: none;
            font-size: 0.875rem;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
            display: none;
        }

        .btn-primary.loading .loading-spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
    }
}
</style>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="/" class="logo">
                <img src="logo.png" alt="MyBizStudies.com">
            </a>

            <div class="auth-header">
                <h1>Create Your Account</h1>
                <p>Start mastering Business Studies today</p>
            </div>

            <div id="message" class="message"></div>

            <form id="signupForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="firstName">First Name</label>
                        <input
                            type="text"
                            id="firstName"
                            class="form-input"
                            placeholder="John"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="lastName">Last Name</label>
                        <input
                            type="text"
                            id="lastName"
                            class="form-input"
                            placeholder="Doe"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Create a strong password"
                            required
                            minlength="8"
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword()">👁️</button>
                    </div>
                    <div class="password-requirements">Must be at least 8 characters</div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="loading-spinner"></span>
                    <span class="btn-text">Create Account</span>
                </button>

                <div class="terms-checkbox">
                    <input type="checkbox" id="agreeTerms">
                    <label for="agreeTerms">I agree to the <a href="terms.html" target="_blank">Terms of Service</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></label>
                </div>
                <p class="terms-error" id="termsError">You must agree to the Terms of Service and Privacy Policy</p>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login.html">Sign in</a>
            </div>
        </div>

        <a href="/" class="back-link">
            ← Back to home
        </a>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://zyaywzzmjpctpodpxhge.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5YXl3enptanBjdHBvZHB4aGdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk5MjcwODIsImV4cCI6MjA4NTUwMzA4Mn0.Mfx00hUv9e6PNtWvnfbQKZzNWKvXIzQUN7bfqDijGvQ';

        // Initialize Supabase client
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM Elements
        const signupForm = document.getElementById('signupForm');
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        // Check if already logged in - redirect to app
        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.href = '/app.html';
            }
        }
        checkAuth();

        // Show message
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type} show`;
        }

        // Toggle password visibility
        function togglePassword() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        }

        // Handle form submission
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const firstName = firstNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Validate password
            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }

            // Validate terms checkbox
            const agreeTerms = document.getElementById('agreeTerms');
            const termsError = document.getElementById('termsError');
            if (!agreeTerms.checked) {
                termsError.style.display = 'block';
                return;
            }
            termsError.style.display = 'none';

            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                // Sign up the user
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            first_name: firstName,
                            last_name: lastName,
                            full_name: `${firstName} ${lastName}`
                        },
                        emailRedirectTo: window.location.origin + '/app.html'
                    }
                });

                if (error) throw error;

                // Check if email confirmation is required
                if (data.user && data.user.identities && data.user.identities.length === 0) {
                    showMessage('An account with this email already exists. Please sign in.', 'error');
                    return;
                }

                // Store user info for after email confirmation
                localStorage.setItem('pendingUser', JSON.stringify({
                    email,
                    firstName,
                    lastName,
                    userId: data.user?.id
                }));

                // Check if email confirmation is needed (no session means confirmation required)
                if (data.user && !data.session) {
                    // Email confirmation required - show success message
                    document.getElementById('signupForm').style.display = 'none';
                    document.querySelector('.auth-header').style.display = 'none';
                    document.querySelector('.auth-footer').style.display = 'none';
                    document.querySelector('.terms-checkbox').style.display = 'none';
                    document.getElementById('termsError').style.display = 'none';
                    messageDiv.innerHTML = `
                        <div style="text-align: center;">
                            <h2 style="color: var(--primary); margin-bottom: 1rem; font-size: 1.5rem;">Check Your Email!</h2>
                            <p style="color: var(--gray-600);">
                                We've sent a confirmation link to <strong>${email}</strong>
                            </p>
                        </div>
                    `;
                    messageDiv.className = 'message success show';
                    messageDiv.style.background = '#f0fdf4';
                    messageDiv.style.padding = '2rem';
                    messageDiv.style.border = 'none';
                    return;
                }

                // If session exists (email confirmation not required), redirect to app
                showMessage('Account created! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = '/app.html';
                }, 1500);

            } catch (error) {
                showMessage(error.message || 'Signup failed. Please try again.', 'error');
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });
    </script>
