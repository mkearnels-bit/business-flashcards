<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | MyBizStudies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #1e3a5f;
            --primary-dark: #152a45;
            --primary-light: #2d5a8a;
            --accent: #e67e22;
            --accent-light: #f39c12;
            --secondary: #3498db;
            --success: #27ae60;
            --error: #e74c3c;
            --dark: #0f172a;
            --gray-900: #1e293b;
            --gray-700: #334155;
            --gray-500: #64748b;
            --gray-300: #cbd5e1;
            --gray-100: #f1f5f9;
            --gray-50: #f8fafc;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--gray-50);
            color: var(--gray-900);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .page-header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-100);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .page-header img {
            height: 40px;
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }

        /* Hero */
        .contact-hero {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
            color: white;
            text-align: center;
            padding: 3rem 2rem;
        }

        .contact-hero h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .contact-hero p {
            font-size: 1rem;
            opacity: 0.85;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Main Content */
        .contact-container {
            max-width: 700px;
            margin: -2rem auto 3rem;
            padding: 0 1.5rem;
            width: 100%;
            flex: 1;
        }

        .contact-card {
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
        }

        /* Category Selector */
        .category-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.75rem;
            display: block;
        }

        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
        }

        .category-option {
            position: relative;
        }

        .category-option input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .category-option label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.85rem 1rem;
            border: 2px solid var(--gray-100);
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--gray-700);
            transition: all 0.2s ease;
        }

        .category-option label:hover {
            border-color: var(--gray-300);
            background: var(--gray-50);
        }

        .category-option input:checked + label {
            border-color: var(--primary);
            background: rgba(30, 58, 95, 0.05);
            color: var(--primary);
            font-weight: 600;
        }

        .category-icon {
            font-size: 1.2rem;
            width: 28px;
            text-align: center;
        }

        /* Form Fields */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.4rem;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--gray-100);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--gray-900);
            transition: border-color 0.2s;
            outline: none;
        }

        .form-input:focus,
        .form-textarea:focus {
            border-color: var(--primary);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--gray-300);
        }

        .form-textarea {
            resize: vertical;
            min-height: 140px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(30, 58, 95, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Success / Error Messages */
        .form-message {
            padding: 1rem 1.25rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1.25rem;
            display: none;
        }

        .form-message.success {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success);
            border: 1px solid rgba(39, 174, 96, 0.2);
            display: block;
        }

        .form-message.error {
            background: rgba(231, 76, 60, 0.1);
            color: var(--error);
            border: 1px solid rgba(231, 76, 60, 0.2);
            display: block;
        }

        /* Info Box */
        .contact-info {
            margin-top: 1.75rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--gray-100);
            text-align: center;
        }

        .contact-info p {
            font-size: 0.85rem;
            color: var(--gray-500);
            line-height: 1.6;
        }

        .contact-info a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-info a:hover {
            color: var(--accent);
        }

        /* Footer */
        .page-footer {
            background: var(--dark);
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            padding: 1.5rem 2rem;
            font-size: 0.8rem;
            margin-top: auto;
        }

        .page-footer a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
        }

        .page-footer a:hover {
            color: var(--accent);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .contact-hero h1 {
                font-size: 1.5rem;
            }

            .contact-card {
                padding: 1.5rem;
            }

            .category-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="page-header">
        <a href="index.html"><img src="logo.png" alt="MyBizStudies"></a>
        <a href="index.html" class="back-link">Back to Home</a>
    </header>

    <div class="contact-hero">
        <h1>Get in Touch</h1>
        <p>Have a question, suggestion, or found a bug? We would love to hear from you.</p>
    </div>

    <div class="contact-container">
        <div class="contact-card">

            <div id="formMessage" class="form-message"></div>

            <form id="contactForm" action="https://formspree.io/f/mnjbqrlb" method="POST">

                <span class="category-label">What is this about?</span>
                <div class="category-grid">
                    <div class="category-option">
                        <input type="radio" name="category" id="catQuestion" value="Question" checked>
                        <label for="catQuestion">
                            <span class="category-icon">❓</span>
                            Ask a Question
                        </label>
                    </div>
                    <div class="category-option">
                        <input type="radio" name="category" id="catSuggestion" value="Suggestion">
                        <label for="catSuggestion">
                            <span class="category-icon">💡</span>
                            Suggestion
                        </label>
                    </div>
                    <div class="category-option">
                        <input type="radio" name="category" id="catBug" value="Bug Report">
                        <label for="catBug">
                            <span class="category-icon">🐛</span>
                            Report a Bug
                        </label>
                    </div>
                    <div class="category-option">
                        <input type="radio" name="category" id="catGeneral" value="General">
                        <label for="catGeneral">
                            <span class="category-icon">💬</span>
                            General
                        </label>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="name">Your Name</label>
                        <input type="text" id="name" name="name" class="form-input" placeholder="Full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Your Email</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" class="form-input" placeholder="Brief summary" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="message">Message</label>
                    <textarea id="message" name="message" class="form-textarea" placeholder="Tell us more..." required></textarea>
                </div>

                <!-- Honeypot spam protection -->
                <input type="text" name="_gotcha" style="display:none">

                <button type="submit" class="btn-submit" id="submitBtn">Send Message</button>
            </form>

            <div class="contact-info">
                <p>You can also email us directly at <a href="mailto:hello@mybizstudies.com">hello@mybizstudies.com</a></p>
            </div>

        </div>
    </div>

    <footer class="page-footer">
        <p>&copy; 2026 MyBizStudies. All rights reserved. | <a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Service</a></p>
    </footer>

    <script>
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const formMessage = document.getElementById('formMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            formMessage.className = 'form-message';
            formMessage.style.display = 'none';

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    formMessage.textContent = 'Message sent successfully! We will get back to you soon.';
                    formMessage.className = 'form-message success';
                    form.reset();
                    document.getElementById('catQuestion').checked = true;
                } else {
                    throw new Error('Form submission failed');
                }
            } catch (error) {
                formMessage.textContent = 'Something went wrong. Please try emailing us directly at hello@mybizstudies.com';
                formMessage.className = 'form-message error';
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Send Message';
        });
    </script>

</body>
</html>
